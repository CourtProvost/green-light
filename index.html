<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Light — Availability Polls</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EEE3;
    --paper-2:#EAE3D2;
    --card:#FBF9F3;
    --ink:#1C1B17;
    --ink-soft:#5B574C;
    --ink-faint:#8A8474;
    --green:#00693E;
    --green-deep:#00442A;
    --green-mist:#DCE8DF;
    --gold:#A69565;
    --bonfire:#BA5624;
    --line:#DAD3C0;
    --white:#FFFFFF;
    --font-display:'Source Serif 4', Georgia, serif;
    --font-body:'Inter', -apple-system, sans-serif;
    --font-mono:'IBM Plex Mono', 'Courier New', monospace;
    --radius:10px;
    --shadow: 0 1px 2px rgba(28,27,23,0.06), 0 4px 14px rgba(28,27,23,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    line-height:1.5;
  }
  #app{min-height:100vh;}
  a{color:var(--green-deep);}
  button{font-family:var(--font-body);cursor:pointer;}
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--bonfire);
    outline-offset:2px;
  }
  .wrap{max-width:980px;margin:0 auto;padding:28px 20px 80px;}
  .topbar{
    background:var(--green-deep);
    color:#EFEADE;
    border-bottom:3px solid var(--gold);
  }
  .topbar-inner{
    max-width:980px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:22px;height:26px;flex:none;}
  .brand-name{
    font-family:var(--font-display);
    font-weight:600;font-size:20px;color:#F3EEE3;letter-spacing:0.2px;
  }
  .brand-tag{font-size:12px;color:#BFD3C6;font-family:var(--font-mono);}
  .brand-tag em{font-family:var(--font-display);font-style:italic;color:#EFEADE;}
  .brand-tag .translation{display:block;font-size:11px;color:#9FB6A8;letter-spacing:0.02em;}
  .nav-link{
    background:none;border:1px solid rgba(243,238,227,0.35);color:#F3EEE3;
    padding:6px 12px;border-radius:20px;font-size:13px;font-family:var(--font-mono);
  }
  .nav-link:hover{background:rgba(243,238,227,0.12);}
 
  h1,h2,h3{font-family:var(--font-display);margin:0;color:var(--ink);}
  .eyebrow{
    font-family:var(--font-mono);font-size:12px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--green-deep);margin:0 0 6px;
  }
 
  /* Home */
  .hero{padding:36px 0 8px;}
  .hero h1{font-size:38px;line-height:1.15;max-width:600px;}
  .hero p{color:var(--ink-soft);max-width:520px;font-size:15.5px;}
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:28px;}
  @media (max-width:720px){.home-grid{grid-template-columns:1fr;}}
  .home-card{
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);
    border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);
  }
  .home-card h3{font-size:19px;margin-bottom:8px;}
  .home-card p{color:var(--ink-soft);font-size:14px;margin:0 0 14px;}
  .code-input-row{display:flex;gap:8px;}
  .code-input-row input{text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font-mono);}
 
  .recent-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
  .recent-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    border:1px solid var(--line);border-radius:8px;background:var(--white);padding:4px 6px 4px 14px;
  }
  .recent-item-main{flex:1;display:flex;flex-direction:column;gap:3px;cursor:pointer;padding:8px 0;min-width:0;}
  .recent-item-main:hover .recent-title{color:var(--green-deep);text-decoration:underline;}
  .recent-title{font-weight:600;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .recent-meta{font-size:12px;color:var(--ink-faint);font-family:var(--font-mono);display:flex;align-items:center;gap:6px;}
  .recent-meta .code-badge{padding:2px 7px;font-size:11px;}
 
  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;gap:6px;justify-content:center;
    border-radius:8px;border:1px solid var(--green-deep);
    background:var(--green);color:#fff;font-weight:600;font-size:14px;
    padding:10px 18px;transition:transform .05s ease, background .15s ease;
  }
  .btn:hover{background:var(--green-deep);}
  .btn:active{transform:translateY(1px);}
  .btn.secondary{background:transparent;color:var(--green-deep);border:1px solid var(--line);}
  .btn.secondary:hover{background:var(--green-mist);border-color:var(--green);}
  .btn.ghost{background:transparent;color:var(--ink-soft);border:none;padding:8px 4px;}
  .btn.ghost:hover{color:var(--green-deep);}
  .btn[disabled]{opacity:0.45;cursor:not-allowed;}
  .btn.small{padding:6px 12px;font-size:13px;}
  .btn.tiny{padding:4px 10px;font-size:12px;border-radius:6px;}
 
  /* Forms */
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.03em;}
  label .optional{text-transform:none;font-weight:500;color:var(--ink-faint);letter-spacing:0;}
  input[type=text], input[type=date], input[type=time], input[type=number], textarea, select{
    width:100%;font-family:var(--font-body);font-size:14.5px;color:var(--ink);
    border:1px solid var(--line);background:var(--white);border-radius:7px;
    padding:9px 11px;
  }
  select{-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg, transparent 50%, var(--ink-soft) 50%), linear-gradient(135deg, var(--ink-soft) 50%, transparent 50%);background-position: calc(100% - 18px) center, calc(100% - 13px) center;background-size:5px 5px, 5px 5px;background-repeat:no-repeat;padding-right:30px;}
  textarea{resize:vertical;min-height:64px;}
  .field{margin-bottom:16px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.field-row{grid-template-columns:1fr;}}
  .field-hint{font-size:12.5px;color:var(--ink-faint);margin:-10px 0 14px;}
  .radio-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .radio-pill{
    border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:13.5px;
    background:var(--white);color:var(--ink-soft);
  }
  .radio-pill.active{background:var(--green);border-color:var(--green-deep);color:#fff;font-weight:600;}
  .custom-min-select{width:200px;display:inline-block;margin-left:8px;}
 
  /* week nav + calendar paint (create screen) */
  .week-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .week-label{font-family:var(--font-mono);font-size:13px;color:var(--ink);min-width:150px;text-align:center;font-weight:600;}
  .week-jump{display:flex;gap:6px;align-items:center;}
  .week-jump input[type=date]{width:auto;padding:6px 8px;font-size:13px;}
  .paint-grid{max-height:440px;overflow-y:auto;}
  .hours-panel{
    display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;
    background:var(--paper-2);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;margin-bottom:12px;
  }
  .hours-panel .field{margin-bottom:0;}
  .hours-panel .field label{margin-bottom:4px;}
  .hours-panel input[type=time]{width:auto;padding:7px 9px;}
  .hours-presets{display:flex;gap:6px;flex-wrap:wrap;}
  .paint-summary-list{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
  .paint-summary-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--white);border:1px solid var(--line);border-radius:8px;padding:8px 12px;
  }
  .psi-date{font-family:var(--font-mono);font-weight:600;font-size:12.5px;color:var(--ink);min-width:90px;flex:none;}
  .psi-range{font-size:13px;color:var(--ink-soft);flex:1;}
  .paint-summary-item.short{border-left:3px solid var(--gold);}
  .warn-text{
    background:#FBF6E8;border:1px dashed var(--gold);border-radius:8px;
    padding:10px 14px;margin:10px 0 0;font-size:13px;color:var(--ink-soft);
  }
  .warn-tag{color:var(--bonfire);font-family:var(--font-mono);font-size:11px;}
 
  /* Card / Ribbon */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:22px;}
  .ribbon{
    background:var(--card);border:1px solid var(--line);border-left:6px solid var(--green);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 22px;margin-bottom:22px;
  }
  .ribbon-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .ribbon h2{font-size:23px;}
  .ribbon-meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:13.5px;color:var(--ink-soft);}
  .ribbon-meta span b{color:var(--ink);font-weight:600;}
  .ribbon-details{margin-top:10px;font-size:14px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:10px;}
  .code-badge-row{display:flex;align-items:center;gap:8px;}
  .code-badge{
    font-family:var(--font-mono);font-size:13px;background:var(--green-deep);color:#F3EEE3;
    padding:5px 10px;border-radius:6px;letter-spacing:0.06em;
  }
 
  /* Grid (respond + results + create-paint) */
  .grid-wrapper{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);}
  table.sched{border-collapse:collapse;width:100%;}
  table.sched th, table.sched td{border:1px solid var(--line);}
  table.sched thead th{
    position:sticky;top:0;background:var(--paper-2);z-index:2;
    font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);
    padding:8px 6px;text-align:center;min-width:88px;font-weight:600;
  }
  table.sched thead th .dow{display:block;font-size:11px;color:var(--ink-faint);text-transform:uppercase;}
  table.sched tbody th{
    position:sticky;left:0;background:var(--paper-2);z-index:1;
    font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);
    padding:6px 10px;text-align:right;white-space:nowrap;font-weight:500;
  }
  td.cell{
    height:26px;min-width:88px;cursor:pointer;user-select:none;-webkit-user-select:none;
    background:var(--white);position:relative;
  }
  /* create-screen paint grid: 15-min rows, borders only at the hour (solid) and half-hour (dashed) */
  .paint-grid table.sched th, .paint-grid table.sched td{border-left:1px solid var(--line);border-right:1px solid var(--line);border-top:none;border-bottom:none;}
  .paint-grid table.sched td.cell{height:15px;}
  .paint-grid table.sched tr.row-hour th, .paint-grid table.sched tr.row-hour td{border-top:1px solid var(--line);}
  .paint-grid table.sched tr.row-half th, .paint-grid table.sched tr.row-half td{border-top:1px dashed var(--line);}
  .paint-grid table.sched tr.row-quarter th, .paint-grid table.sched tr.row-quarter td{border-top:none;}
  .paint-grid table.sched tr:last-child th, .paint-grid table.sched tr:last-child td{border-bottom:1px solid var(--line);}
  .paint-grid table.sched thead th{border-top:none;}
  .paint-grid table.sched tbody th{font-size:11px;padding:2px 10px;vertical-align:top;}
  td.cell.filled{
    background-image: repeating-linear-gradient(135deg, var(--green) 0 3px, var(--green-deep) 3px 6px);
    background-color:var(--green);
  }
  td.cell.offday{
    background-image: repeating-linear-gradient(135deg, #EDE8DA 0 4px, #E3DCC8 4px 8px);
    cursor:default;
  }
  td.cell.allday{height:44px;}
  .grid-hint{font-size:12.5px;color:var(--ink-faint);margin:8px 2px 0;font-family:var(--font-mono);}
  .allday-row{display:flex;flex-wrap:wrap;gap:10px;padding:16px;}
  .allday-chip{
    border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:110px;text-align:center;
    background:var(--white);cursor:pointer;user-select:none;
  }
  .allday-chip .dow{display:block;font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);text-transform:uppercase;}
  .allday-chip .dnum{font-family:var(--font-display);font-size:18px;margin-top:2px;}
  .allday-chip.filled{
    background-image: repeating-linear-gradient(135deg, var(--green) 0 3px, var(--green-deep) 3px 6px);
    background-color:var(--green);color:#fff;
  }
  .allday-chip.filled .dow, .allday-chip.filled .dnum{color:#fff;}
 
  /* results heat */
  td.cell.heat0{background:var(--white);}
  td.cell.best::after{
    content:"";position:absolute;inset:2px;border:1.5px solid var(--gold);border-radius:2px;pointer-events:none;
  }
  .legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft);margin:10px 2px;font-family:var(--font-mono);}
  .legend-swatch{width:14px;height:14px;border:1px solid var(--line);display:inline-block;border-radius:2px;}
 
  .tooltip-panel{
    background:var(--green-mist);border:1px solid var(--green);border-radius:8px;
    padding:12px 14px;margin-top:12px;font-size:14px;
  }
  .tooltip-panel .who{font-weight:600;color:var(--green-deep);}
 
  .best-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .best-item{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:10px 14px;border:1px solid var(--line);border-radius:8px;background:var(--card);
  }
  .best-item .when{font-family:var(--font-mono);font-size:13.5px;}
  .best-item .count{font-size:13px;color:var(--green-deep);font-weight:700;}
  .best-item.top{border-color:var(--gold);background:#FBF6E8;}
 
  .respondent-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .respondent-pill{
    font-size:12.5px;background:var(--white);border:1px solid var(--line);border-radius:14px;
    padding:4px 10px;color:var(--ink-soft);
  }
  .respondent-pill .proxy{color:var(--bonfire);font-family:var(--font-mono);font-size:11px;}
  .respondent-pill.test{border-style:dashed;border-color:var(--bonfire);}
  .respondent-pill .test-tag{color:var(--bonfire);font-family:var(--font-mono);font-size:11px;}
 
  .test-banner{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    background:#FBF0E6;border:1px dashed var(--bonfire);border-radius:8px;
    padding:12px 16px;margin-bottom:18px;font-size:13.5px;color:var(--ink-soft);
  }
  .test-banner b{color:var(--bonfire);}
  .quick-test-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .quick-test-row .qt-label{font-size:12.5px;color:var(--ink-faint);}
 
  .save-status{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-faint);margin-top:10px;}
  .save-status.saving{color:var(--bonfire);}
  .save-status.saved{color:var(--green-deep);}
 
  .toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .toggle-row input[type=checkbox]{width:16px;height:16px;}
  .toggle-row label{margin:0;text-transform:none;font-weight:500;font-size:14px;}
 
  .share-box{
    background:var(--paper-2);border:1px dashed var(--gold);border-radius:8px;padding:16px 18px;margin-top:6px;
    font-size:13.5px;color:var(--ink-soft);
  }
  .share-box code{font-family:var(--font-mono);background:var(--white);padding:2px 6px;border-radius:4px;border:1px solid var(--line);}
  .copy-feedback{font-size:12.5px;color:var(--green-deep);font-family:var(--font-mono);margin-left:8px;}
  .code-display{
    font-family:var(--font-mono);font-size:26px;letter-spacing:0.12em;color:var(--green-deep);
    background:var(--white);border:1px solid var(--line);border-radius:8px;padding:10px 16px;
    display:inline-block;font-weight:600;
  }
  .actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;align-items:center;}
  .error-text{color:var(--bonfire);font-size:13px;margin-top:-6px;margin-bottom:12px;}
  .empty-note{color:var(--ink-faint);font-size:14px;padding:20px;text-align:center;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
(function(){
  "use strict";
 
  // ---------- Firebase (real, shared, cross-device storage) ----------
  const firebaseConfig = {
    apiKey: "AIzaSyDj6nodhgWFJb55atwn9zS9CAyWfLRJjFo",
    authDomain: "greenlight-afc5d.firebaseapp.com",
    projectId: "greenlight-afc5d",
    storageBucket: "greenlight-afc5d.firebasestorage.app",
    messagingSenderId: "489044763201",
    appId: "1:489044763201:web:fdb9c9386c3d8baec19cc0"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  // Data lives in real Firestore collections: polls/{code} and polls/{code}/responses/{slug}.
  // The rest of this app still speaks in "poll:CODE" / "resp:CODE:SLUG" key strings (unchanged everywhere
  // else) — these helpers translate those keys into the right document/subcollection paths.
 
  const PAINT_STEP = 15; // minutes — resolution of the calendar-paint grid on the create screen
  const DEFAULT_DAY_START = 8*60;  // 8:00 AM
  const DEFAULT_DAY_END   = 17*60; // 5:00 PM
 
  // ---------- storage helpers ----------
  function describeFirebaseError(e){
    const code = (e && e.code) ? e.code : 'unknown-error';
    const msg = (e && e.message) ? e.message : String(e);
    return code+' — '+msg;
  }
  function keyToRef(key){
    const parts = key.split(':');
    if(parts[0]==='poll' && parts[1]) return db.collection('polls').doc(parts[1]);
    if(parts[0]==='resp' && parts[1] && parts[2]) return db.collection('polls').doc(parts[1]).collection('responses').doc(parts[2]);
    return null;
  }
  async function storSet(key, val){
    try{
      const ref = keyToRef(key);
      if(!ref) throw new Error('Unrecognized storage key: '+key);
      await ref.set({ value: val, updatedAt: Date.now() });
      return { key: key, value: val };
    }catch(e){ console.error('storSet failed', key, e); state.lastError = describeFirebaseError(e); return null; }
  }
  async function storGet(key){
    try{
      const ref = keyToRef(key);
      if(!ref) throw new Error('Unrecognized storage key: '+key);
      const snap = await ref.get();
      if(!snap.exists) return null;
      return { key: key, value: snap.data().value };
    }catch(e){ console.error('storGet failed', key, e); state.lastError = describeFirebaseError(e); return null; }
  }
  async function storList(prefix){
    // Only ever called as storList('resp:CODE:') — list everything in that poll's responses subcollection.
    try{
      const m = /^resp:([^:]+):$/.exec(prefix);
      if(!m) throw new Error('Unrecognized storage prefix: '+prefix);
      const code = m[1];
      const snap = await db.collection('polls').doc(code).collection('responses').get();
      const keys = [];
      snap.forEach(function(doc){ keys.push('resp:'+code+':'+doc.id); });
      return { keys: keys };
    }catch(e){ console.error('storList failed', prefix, e); state.lastError = describeFirebaseError(e); return null; }
  }
  async function storDelete(key){
    try{
      const ref = keyToRef(key);
      if(!ref) throw new Error('Unrecognized storage key: '+key);
      await ref.delete();
      return { key: key, deleted:true };
    }catch(e){ console.error('storDelete failed', key, e); state.lastError = describeFirebaseError(e); return null; }
  }
 
  async function savePoll(poll){ return await storSet('poll:'+poll.code, JSON.stringify(poll)); }
  async function loadPoll(code){ const r = await storGet('poll:'+code); return r ? JSON.parse(r.value) : null; }
  async function saveResponse(code, slug, data){ return await storSet('resp:'+code+':'+slug, JSON.stringify(data)); }
  async function loadResponse(code, slug){ const r = await storGet('resp:'+code+':'+slug); return r ? JSON.parse(r.value) : null; }
  async function loadAllResponses(code){
    const list = await storList('resp:'+code+':');
    if(!list || !list.keys) return [];
    const out = [];
    for(const k of list.keys){
      const r = await storGet(k);
      if(r){ try{ out.push(JSON.parse(r.value)); }catch(e){} }
    }
    return out;
  }
 
  // recent polls: kept in *personal* browser storage — just for this device, not visible to others
  async function loadRecentPolls(){
    try{ const raw = window.localStorage.getItem('greenlightRecentPolls'); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
  }
  async function saveRecentPolls(list){
    try{ window.localStorage.setItem('greenlightRecentPolls', JSON.stringify(list)); }catch(e){}
  }

        let t = timeToMinutes(b.start), end = timeToMinutes(b.end);

  function viewResults(){
    const poll = state.poll;
    if(!poll) return '<div class="empty-note">Loading poll&hellip;</div>';
    const responses = state.allResponses;
    const fineSlots = buildFineSlots(poll);
    const counts = {};
    responses.forEach(function(r){ (r.selections||[]).forEach(function(s){ counts[s]=(counts[s]||0)+1; }); });
    const total = responses.length;
    let maxCount = 0;
    Object.keys(counts).forEach(function(k){ if(counts[k]>maxCount) maxCount=counts[k]; });
 
    function namesFor(slotId){
      return responses.filter(function(r){ return (r.selections||[]).includes(slotId); })
        .map(function(r){ return r.displayName; });
    }
    function slotLabel(id){
      const parts = id.split('|');
      const lbl = formatDateLabel(parts[0]);
      const timePart = parts[1]==='allday' ? 'All day' : minutesToLabel(Number(parts[1]));
      return lbl.dow+' '+lbl.main+' &middot; '+timePart;
    }
 
    // best matching meeting-length windows (handles overlapping start times, e.g. 10:00-10:45 AND 10:15-11:00)
    const isAllDay = poll.durationType==='allday';
    const meetingMinutes = slotMinutesFor(poll);
    const ranked = bestMeetingWindows(poll, responses, 5);
 
    function windowLabel(item){
      const lbl = formatDateLabel(item.date);
      const timePart = isAllDay ? 'All day' : (minutesToLabel(item.start)+'&ndash;'+minutesToLabel(item.end));
      return lbl.dow+' '+lbl.main+' &middot; '+timePart;
    }
 
    let bestHtml = '<div class="empty-note">No responses yet &mdash; share the poll code to get started.</div>';
    if(ranked.length){
      bestHtml = '<div class="best-list">' + ranked.map(function(r,i){
        return '<div class="best-item'+(i===0?' top':'')+'"><span class="when">'+windowLabel(r)+'</span><span class="count">'+r.count+' of '+total+' free</span></div>';
      }).join('') + '</div>';
    }
 
    let gridHtml = '';
    if(isAllDay){
      gridHtml = '<div class="allday-row">' + poll.dates.map(function(dObj){
        const lbl = formatDateLabel(dObj.date); const c = counts[dObj.date+'|allday']||0;
        const heat = maxCount>0 ? c/maxCount : 0;
        const isBest = c===maxCount && c>0;
        return '<div class="allday-chip'+(heat>0?' filled':'')+(isBest?' best':'')+'" style="opacity:'+(heat>0?(0.35+0.65*heat):1)+'" data-slot="'+dObj.date+'|allday'+'" data-action="show-names">'
          +'<span class="dow">'+lbl.dow+'</span><span class="dnum">'+lbl.main+'</span><div style="font-size:11px;margin-top:4px;">'+c+'/'+total+'</div></div>';
      }).join('') + '</div>';
    } else {
      gridHtml = '<div class="grid-wrapper paint-grid"><table class="sched"><thead><tr><th></th>'
        + poll.dates.map(function(dObj){ const lbl=formatDateLabel(dObj.date); return '<th><span class="dow">'+lbl.dow+'</span>'+lbl.main+'</th>'; }).join('')
        + '</tr></thead><tbody>'
        + fineSlots.map(function(t){
            const kind = rowKind(t);
            const label = kind==='hour' ? minutesToLabel(t) : '';
            return '<tr class="row-'+kind+'"><th>'+label+'</th>' + poll.dates.map(function(dObj){
              if(!isSlotValidForDate(dObj, t)){
                return '<td class="cell offday" title="Not offered this day"></td>';
              }
              const slotId = dObj.date+'|'+t;
              const c = counts[slotId]||0;
              const heat = maxCount>0 ? c/maxCount : 0;
              const isBest = c===maxCount && c>0;
              const style = c>0 ? 'style="opacity:'+(0.3+0.7*heat)+'"' : '';
              return '<td class="cell'+(c>0?' filled':' heat0')+(isBest?' best':'')+'" '+style+' data-slot="'+slotId+'" data-action="show-names" title="'+minutesToLabel(t)+' &mdash; '+c+' of '+total+' free"></td>';
            }).join('') + '</tr>';
          }).join('')
        + '</tbody></table></div>';
    }
 
    let tooltipHtml = '';
    if(state.activeCellInfo){
      const names = namesFor(state.activeCellInfo.slot);
      tooltipHtml = '<div class="tooltip-panel">'
        +'<span class="who">'+slotLabel(state.activeCellInfo.slot)+'</span> &mdash; '
        + (names.length ? esc(names.join(', ')) : 'No one yet')
      +'</div>';
    }
 
    const respondentPills = responses.map(function(r){
      return '<span class="respondent-pill'+(r.isTest?' test':'')+'">'+esc(r.displayName)+(r.isProxy?' <span class="proxy">(via '+esc(r.submittedBy)+')</span>':'')+(r.isTest?' <span class="test-tag">(test)</span>':'')+'</span>';
    }).join('');
 
    const testCount = responses.filter(function(r){ return r.isTest; }).length;
    const testBanner = testCount ? (''
      +'<div class="test-banner">'
        +'<span><b>'+testCount+' test response'+(testCount===1?'':'s')+'</b> included below &mdash; clear '+(testCount===1?'it':'them')+' before sharing this poll for real.</span>'
        +'<button class="btn secondary tiny" data-action="clear-test-responses">Clear test responses</button>'
      +'</div>'
    ) : '';
 
    return testBanner + pollRibbon(poll, {eyebrow:'Results', showShare:true})
      + '<div class="card">'
        + '<h3 style="font-size:18px;">Best matching times</h3>'
        + (isAllDay ? '' : '<p class="grid-hint" style="margin-top:0;">Every possible '+formatMinutesLabel(meetingMinutes)+' start time is checked, spaced 15 minutes apart &mdash; so 10:00&ndash;10:45 and 10:15&ndash;11:00 both show up separately if people are free for either.</p>')
        + bestHtml
      + '</div>'
      + '<div class="card">'
        + '<h3 style="font-size:18px;margin-bottom:4px;">Availability grid</h3>'
        + '<p class="grid-hint">Darker means more people are free at that exact 15-minute mark. Click any cell to see who. Hatched cells aren\'t offered that day.</p>'
        + gridHtml
        + '<div class="legend"><span class="legend-swatch" style="background:#fff;"></span> none'
          + '<span class="legend-swatch" style="background:var(--green);opacity:0.5;"></span> some'
          + '<span class="legend-swatch" style="background:var(--green);"></span> most/all</div>'
        + tooltipHtml
      + '</div>'
      + '<div class="card">'
        + '<h3 style="font-size:16px;">'+total+' response'+(total===1?'':'s')+'</h3>'
        + (respondentPills ? '<div class="respondent-list">'+respondentPills+'</div>' : '<p class="empty-note">No one has responded yet.</p>')
      + '</div>'
      + '<div class="actions-row">'
        + '<button class="btn secondary" data-action="go-respond-from-results">Go mark availability</button>'
      + '</div>';
  }
 
  // ---------- actions ----------
  async function goHome(){
    state.view='home'; state.joinError=''; state.editingCode=null;
    render();
    state.recentPolls = await loadRecentPolls();
    render();
  }
 
  function attachHandlers(){
    app.addEventListener('click', onClick, {once:false});
    setupGridPainting();
    setupCreatePainting();
  }
 
  function onClick(e){
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.getAttribute('data-action');
 
    if(action==='dismiss-error'){
      app.removeEventListener('click', onClick);
      state.lastError=''; render(); return;
    }
    if(action==='go-home'){ app.removeEventListener('click', onClick); flushPendingSave().then(goHome); return; }
    if(action==='cancel-edit'){
      app.removeEventListener('click', onClick);
      state.editingCode = null; state.createError='';
      loadAllResponses(state.code).then(function(resps){
        state.allResponses = resps; state.activeCellInfo=null;
        state.view='results'; render();
      });
      return;
    }
    if(action==='new-poll'){
      app.removeEventListener('click', onClick);
      state.editingCode = null;
      state.form = {
        title:'', location:'', details:'',
        durationType:'60', customMinutes:30,
        weekStart: startOfWeekStr(new Date()),
        dayStart: DEFAULT_DAY_START, dayEnd: DEFAULT_DAY_END,
        hoursCustomizeOpen:true, showWeekends:false,
        paintSelections:new Set()
      };
      state.view='create'; state.createError=''; render(); return;
    }
 
    if(action==='join-code'){
      app.removeEventListener('click', onClick);
      const val = document.getElementById('join-code').value.trim().toUpperCase();
      state.joinCode = val;
      if(!val){ state.joinError='Enter a poll code.'; render(); return; }
      loadPoll(val).then(function(poll){
        if(!poll){ state.joinError='No poll found with that code.'; render(); return; }
        state.poll = poll; state.code = val; state.joinError='';
        state.view='respond'; state.identityLocked=false; state.mySelections=new Set();
        render();
        rememberPoll(poll);
      });
      return;
    }
 
    if(action==='open-recent'){
      app.removeEventListener('click', onClick);
      const val = el.getAttribute('data-val');
      loadPoll(val).then(function(poll){
        if(!poll){
          state.recentPolls = state.recentPolls.filter(function(p){ return p.code!==val; });
          saveRecentPolls(state.recentPolls);
          state.joinError='That poll no longer exists — it\'s been removed from your recent list.';
          render();
          return;
        }
        state.poll = poll; state.code = val; state.joinError='';
        state.view='respond'; state.identityLocked=false; state.mySelections=new Set();
        render();
        rememberPoll(poll);
      });
      return;
    }
    if(action==='remove-recent'){
      app.removeEventListener('click', onClick);
      const val = el.getAttribute('data-val');
      state.recentPolls = state.recentPolls.filter(function(p){ return p.code!==val; });
      saveRecentPolls(state.recentPolls);
      render();
      return;
    }
 
    if(action==='go-share'){
      app.removeEventListener('click', onClick);
      flushPendingSave().then(function(){ state.view='share'; state.copyMsg=''; render(); });
      return;
    }
 
    if(action==='edit-poll'){
      app.removeEventListener('click', onClick);
      state.form = formFromPoll(state.poll);
      state.editingCode = state.poll.code;
      state.createError = '';
      state.view = 'create';
      render();
      return;
    }
 
    if(action==='copy-code'){
      app.removeEventListener('click', onClick);
      copyText(state.poll.code).then(function(ok){
        state.copyMsg = ok ? 'Copied.' : 'Copy failed — select the code manually.';
        render();
        setTimeout(function(){ state.copyMsg=''; render(); }, 2500);
      });
      return;
    }
    if(action==='copy-message'){
      app.removeEventListener('click', onClick);
      const ta = document.getElementById('share-message');
      const text = ta ? ta.value : shareMessageTemplate(state.poll);
      copyText(text).then(function(ok){
        state.copyMsg = ok ? 'Message copied.' : 'Copy failed — select the text manually.';
        render();
        setTimeout(function(){ state.copyMsg=''; render(); }, 2500);
      });
      return;
    }
 
    if(action==='set-duration'){
      app.removeEventListener('click', onClick);
      state.form.durationType = el.getAttribute('data-val');
      render(); return;
    }
 
    if(action==='prev-week'){
      app.removeEventListener('click', onClick);
      state.form.weekStart = addDaysStr(state.form.weekStart, -7);
      render(); return;
    }
    if(action==='next-week'){
      app.removeEventListener('click', onClick);
      state.form.weekStart = addDaysStr(state.form.weekStart, 7);
      render(); return;
    }
    if(action==='today-week'){
      app.removeEventListener('click', onClick);
      state.form.weekStart = startOfWeekStr(new Date());
      render(); return;
    }
    if(action==='jump-week'){
      app.removeEventListener('click', onClick);
      const val = document.getElementById('f-jump-date').value;
      if(val){ state.form.weekStart = startOfWeekStr(parseDate(val)); }
      render(); return;
    }
    if(action==='toggle-weekends'){
      app.removeEventListener('click', onClick);
      state.form.showWeekends = !state.form.showWeekends;
      render(); return;
    }
    if(action==='toggle-customize-hours'){
      app.removeEventListener('click', onClick);
      syncCreateFormFromDom();
      state.form.hoursCustomizeOpen = !state.form.hoursCustomizeOpen;
      render(); return;
    }
    if(action==='hours-preset'){
      app.removeEventListener('click', onClick);
      state.form.dayStart = Number(el.getAttribute('data-start'));
      state.form.dayEnd = Number(el.getAttribute('data-end'));
      render(); return;
    }
    if(action==='clear-date-paint'){
      app.removeEventListener('click', onClick);
      const val = el.getAttribute('data-val');
      const toDelete = [];
      state.form.paintSelections.forEach(function(id){ if(id.slice(0,id.indexOf('|'))===val) toDelete.push(id); });
      toDelete.forEach(function(id){ state.form.paintSelections.delete(id); });
      render(); return;
    }
 
    if(action==='create-poll'){
      app.removeEventListener('click', onClick);
      syncCreateFormFromDom();
      const f = state.form;
      if(!f.title.trim()){ state.createError='Give the poll a title.'; render(); return; }
      const isAllDay = f.durationType==='allday';
      const dates = datesFromPaintSelections(f.paintSelections, isAllDay);
      if(dates.length===0){
        state.createError = isAllDay ? 'Mark at least one date on the calendar.' : 'Mark at least one date and time block on the calendar.';
        render(); return;
      }
      const isEditing = !!state.editingCode;
      const prior = isEditing ? state.poll : null;
      const poll = {
        code: isEditing ? state.editingCode : uid(6),
        title: f.title.trim(),
        location: f.location.trim(),
        details: f.details.trim(),
        durationType: f.durationType,
        customMinutes: f.customMinutes,
        dates: dates,
        createdAt: isEditing && prior ? prior.createdAt : Date.now(),
        updatedAt: isEditing ? Date.now() : undefined
      };
      savePoll(poll).then(function(){
        state.poll = poll; state.code = poll.code; state.editingCode = null;
        state.identityLocked=false; state.mySelections=new Set();
        state.view='share'; state.createError=''; state.copyMsg='';
        render();
        rememberPoll(poll);
      });
      return;
    }
 
    if(action==='lock-identity'){
      app.removeEventListener('click', onClick);
      const yn = document.getElementById('r-yourname').value.trim();
      const isProxy = document.getElementById('r-proxy').checked;
      const pn = isProxy ? (document.getElementById('r-proxyname') ? document.getElementById('r-proxyname').value.trim() : '') : '';
      if(!yn){ state.createError='Enter your name.'; render(); return; }
      if(isProxy && !pn){ state.createError='Enter the name of the person you\'re responding for.'; render(); return; }
      state.yourName = yn; state.isProxy = isProxy; state.proxyName = pn; state.createError=''; state.isTestIdentity=false;
      const displayName = isProxy ? pn : yn;
      const slug = slugify(displayName);
      loadResponse(state.code, slug).then(function(existing){
        state.mySelections = new Set(existing ? (existing.selections||[]) : []);
        state.identityLocked = true;
        state.saveState = existing ? 'saved' : 'idle';
        render();
      });
      return;
    }
    if(action==='quick-test-identity'){
      app.removeEventListener('click', onClick);
      const letter = el.getAttribute('data-val');
      const yn = 'Test '+letter;
      state.yourName = yn; state.isProxy = false; state.proxyName = ''; state.createError=''; state.isTestIdentity = true;
      const slug = slugify(yn);
      loadResponse(state.code, slug).then(function(existing){
        state.mySelections = new Set(existing ? (existing.selections||[]) : []);
        state.identityLocked = true;
        state.saveState = existing ? 'saved' : 'idle';
        render();
      });
      return;
    }
    if(action==='change-identity'){
      app.removeEventListener('click', onClick);
      flushPendingSave().then(function(){ state.identityLocked=false; render(); });
      return;
    }
 
    if(action==='view-results-from-respond' || action==='go-respond-from-results'){
      app.removeEventListener('click', onClick);
      if(action==='view-results-from-respond'){
        flushPendingSave().then(function(){ return loadAllResponses(state.code); }).then(function(resps){
          state.allResponses = resps; state.activeCellInfo=null;
          state.view='results'; render();
        });
      } else {
        state.view='respond'; render();
      }
      return;
    }
 
    if(action==='show-names'){
      app.removeEventListener('click', onClick);
      state.activeCellInfo = { slot: el.getAttribute('data-slot') };
      render();
      return;
    }
 
    if(action==='clear-test-responses'){
      app.removeEventListener('click', onClick);
      const testResps = state.allResponses.filter(function(r){ return r.isTest; });
      Promise.all(testResps.map(function(r){ return storDelete('resp:'+state.code+':'+slugify(r.displayName)); }))
        .then(function(){ return loadAllResponses(state.code); })
        .then(function(resps){
          state.allResponses = resps; state.activeCellInfo=null;
          render();
        });
      return;
    }
 
    if(action==='cell' || action==='paintcell'){
      // handled by painting logic (mousedown), click fallback for simple taps
      return;
    }
  }
 
  async function copyText(text){
    try{ await navigator.clipboard.writeText(text); return true; }catch(e){ return false; }
  }
 
  function syncCreateFormFromDom(){
    const f = state.form;
    f.title = document.getElementById('f-title') ? document.getElementById('f-title').value : f.title;
    f.location = document.getElementById('f-location') ? document.getElementById('f-location').value : f.location;
    f.details = document.getElementById('f-details') ? document.getElementById('f-details').value : f.details;
    if(document.getElementById('f-custom-min')) f.customMinutes = Number(document.getElementById('f-custom-min').value)||30;
  }
 
  // live-sync a few text inputs without full re-render (avoid losing focus)
  function liveBind(id, target, key){
    const el = document.getElementById(id);
    if(el){
      el.addEventListener('input', function(){ target[key] = el.value; });
      el.addEventListener('change', function(){ target[key] = el.value; });
    }
  }
 
  // ---------- drag painting: RESPOND grid (saves to shared storage) ----------
  let isPainting = false, paintValue = true;
  let saveTimer = null;
  let pendingSavePromise = null;
 
  function performSaveNow(){
    const displayName = state.isProxy ? state.proxyName : state.yourName;
    const slug = slugify(displayName);
    const data = {
      displayName: displayName,
      submittedBy: state.yourName,
      isProxy: state.isProxy,
      isTest: state.isTestIdentity,
      selections: Array.from(state.mySelections),
      updatedAt: Date.now()
    };
    state.saveState = 'saving';
    const statusEl = app.querySelector('.save-status');
    if(statusEl){ statusEl.textContent='Saving…'; statusEl.className='save-status saving'; }
    pendingSavePromise = saveResponse(state.code, slug, data).then(function(result){
      pendingSavePromise = null;
      if(!result){ render(); return; } // failure — state.lastError was already set inside storSet, show it now
      state.saveState = 'saved';
      const el2 = app.querySelector('.save-status');
      if(el2){ el2.textContent = 'Saved ✓ '+nowStamp(); el2.className='save-status saved'; }
    });
    return pendingSavePromise;
  }
 
  function scheduleSave(){
    state.saveState = 'saving';
    const statusEl = app.querySelector('.save-status');
    if(statusEl){ statusEl.textContent='Saving…'; statusEl.className='save-status saving'; }
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){ saveTimer = null; performSaveNow(); }, 550);
  }
 
  // Call before navigating away from the respond screen so we never read results before our own
  // just-painted answer has actually finished writing to the database.
  async function flushPendingSave(){
    if(saveTimer){ clearTimeout(saveTimer); saveTimer = null; await performSaveNow(); return; }
    if(pendingSavePromise){ await pendingSavePromise; }
  }
 
  function applyCell(cellEl, val){
    const slot = cellEl.getAttribute('data-slot');
    if(val) state.mySelections.add(slot); else state.mySelections.delete(slot);
    cellEl.classList.toggle('filled', val);
    scheduleSave();
  }
 
  function setupGridPainting(){
    if(state.view!=='respond' || !state.identityLocked) return;
    const container = app;
    const cells = container.querySelectorAll('[data-action="cell"]');
    if(!cells.length) return;
 
    cells.forEach(function(cell){
      cell.addEventListener('mousedown', function(e){
        e.preventDefault();
        isPainting = true;
        paintValue = !cell.classList.contains('filled');
        applyCell(cell, paintValue);
      });
      cell.addEventListener('mouseenter', function(e){
        if(!isPainting) return;
        if(e.buttons !== 1){ isPainting = false; return; }
        applyCell(cell, paintValue);
      });
      cell.addEventListener('touchstart', function(e){
        e.preventDefault();
        isPainting = true;
        paintValue = !cell.classList.contains('filled');
        applyCell(cell, paintValue);
      }, {passive:false});
    });
 
    container.addEventListener('touchmove', function(e){
      if(!isPainting) return;
      e.preventDefault();
      const t = e.touches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const cellEl = el ? el.closest('[data-action="cell"]') : null;
      if(cellEl) applyCell(cellEl, paintValue);
    }, {passive:false});
 
    window.addEventListener('mouseup', function(){ isPainting = false; }, {once:true});
    window.addEventListener('touchend', function(){ isPainting = false; }, {once:true});
  }
 
  // ---------- drag painting: CREATE calendar (in-memory only, until Create Poll is clicked) ----------
  let isPaintingCreate = false, createPaintValue = true;
 
  function applyPaintCell(cellEl, val){
    const slot = cellEl.getAttribute('data-slot');
    if(val) state.form.paintSelections.add(slot); else state.form.paintSelections.delete(slot);
    cellEl.classList.toggle('filled', val);
  }
 
  function refreshPaintSummary(){
    const el = document.getElementById('paint-summary');
    if(el) el.innerHTML = paintSummaryHtml(state.form);
  }
 
  function setupCreatePainting(){
    if(state.view!=='create') return;
    const container = app;
    const cells = container.querySelectorAll('[data-action="paintcell"]');
    if(!cells.length) return;
 
    cells.forEach(function(cell){
      cell.addEventListener('mousedown', function(e){
        e.preventDefault();
        isPaintingCreate = true;
        createPaintValue = !cell.classList.contains('filled');
        applyPaintCell(cell, createPaintValue);
      });
      cell.addEventListener('mouseenter', function(e){
        if(!isPaintingCreate) return;
        if(e.buttons !== 1){ isPaintingCreate = false; refreshPaintSummary(); return; }
        applyPaintCell(cell, createPaintValue);
      });
      cell.addEventListener('touchstart', function(e){
        e.preventDefault();
        isPaintingCreate = true;
        createPaintValue = !cell.classList.contains('filled');
        applyPaintCell(cell, createPaintValue);
      }, {passive:false});
    });
 
    container.addEventListener('touchmove', function(e){
      if(!isPaintingCreate) return;
      e.preventDefault();
      const t = e.touches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const cellEl = el ? el.closest('[data-action="paintcell"]') : null;
      if(cellEl) applyPaintCell(cellEl, createPaintValue);
    }, {passive:false});
 
    window.addEventListener('mouseup', function(){ if(isPaintingCreate){ isPaintingCreate=false; refreshPaintSummary(); } }, {once:true});
    window.addEventListener('touchend', function(){ if(isPaintingCreate){ isPaintingCreate=false; refreshPaintSummary(); } }, {once:true});
  }
 
  // bind live inputs after each render for smoother typing
  const origRender = render;
  render = function(){
    origRender();
    liveBind('f-title', state.form, 'title');
    liveBind('f-location', state.form, 'location');
    liveBind('f-details', state.form, 'details');
    liveBind('join-code', state, 'joinCode');
    liveBind('r-yourname', state, 'yourName');
    liveBind('r-proxyname', state, 'proxyName');
    const customSel = document.getElementById('f-custom-min');
    if(customSel){ customSel.addEventListener('change', function(){ state.form.customMinutes = Number(customSel.value); }); }
    const dayStartEl = document.getElementById('f-day-start');
    const dayEndEl = document.getElementById('f-day-end');
    if(dayStartEl){ dayStartEl.addEventListener('change', function(){
      state.form.dayStart = timeToMinutes(dayStartEl.value||'07:00');
      render();
    }); }
    if(dayEndEl){ dayEndEl.addEventListener('change', function(){
      let mins = timeToMinutes(dayEndEl.value||'18:00');
      if(mins===0) mins = 1440; // treat midnight-as-end to mean end of day
      state.form.dayEnd = mins;
      render();
    }); }
    const proxyBox = document.getElementById('r-proxy');
    if(proxyBox){ proxyBox.addEventListener('change', function(){ state.isProxy = proxyBox.checked; render(); }); }
  };
 
  render();
  loadRecentPolls().then(function(list){
    state.recentPolls = list;
    if(state.view==='home') render();
  });
})();
</script>
</body>
</html>
